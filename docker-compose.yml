services:
    web:
        build: .
        container_name: apache
        ports:
            - "8080:80"
        volumes:
            - ./src:/var/www/html
            - ./php.ini:/usr/local/etc/php/php.ini
        depends_on:
            - db
        environment:
            DB_HOST: mysql_db
            DB_NAME: solo_forum
            DB_USER: stas
            DB_PASS: stas

    db:
        image: mysql:8.0-debian
        platform: linux/amd64
        container_name: mysql_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: 124358
            MYSQL_DATABASE: solo_forum
            MYSQL_USER: stas
            MYSQL_PASSWORD: stas
        command: --default-authentication-plugin=mysql_native_password
        volumes:
            - db_data:/var/lib/mysql
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - "3307:3306"

volumes:
    db_data: